spring.application.name=school-management

# Render fournit automatiquement PORT. En local, l'application démarre sur 8080.
server.port=${PORT:8080}

# PostgreSQL compatible Render + local
# Local par défaut : jdbc:postgresql://localhost:5432/gestion22_db / postgres / postgres
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:gestion22_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA pour PostgreSQL
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Logs utiles sur Render
logging.level.org.springframework=INFO
logging.level.com.example.school=INFO
