<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/base :: layout(~{::section})">
  <section>
    <h1 th:text="${subject.id} == null ? 'Nouvelle matière' : 'Modifier matière'">Form</h1>

    <form th:action="${subject.id} == null ? @{/admin/subjects} : @{'/admin/subjects/' + ${subject.id}}"
          th:object="${subject}" method="post" class="mt-3">

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nom</label>
          <input class="form-control" th:field="*{name}" required />
        </div>

        <div class="col-md-3">
          <label class="form-label">Coefficient</label>
          <input class="form-control" th:field="*{coefficient}" type="number" min="1" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Professeur (optionnel)</label>
          <select class="form-select" th:field="*{professor}">
            <option th:value="${null}">-- Aucun --</option>
            <option th:each="p : ${professors}" th:value="${p.id}" th:text="${p.firstName + ' ' + p.lastName}"></option>
          </select>
          <div class="form-text">Créez d’abord des professeurs si la liste est vide.</div>
        </div>
      </div>

      <div class="mt-3">
        <button class="btn btn-primary">Enregistrer</button>
        <a class="btn btn-secondary" th:href="@{/admin/subjects}">Annuler</a>
      </div>
    </form>
  </section>
</div>
</body>
</html>
