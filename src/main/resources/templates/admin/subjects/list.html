<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/base :: layout(~{::section})">
  <section>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="m-0">Matières</h1>
      <a class="btn btn-success" th:href="@{/admin/subjects/new}">+ Nouveau</a>
    </div>

    <table class="table table-striped align-middle">
      <thead>
      <tr>
        <th>ID</th><th>Nom</th><th>Coef</th><th>Professeur</th><th class="text-end">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="s : ${subjects}">
        <td th:text="${s.id}">1</td>
        <td th:text="${s.name}">Math</td>
        <td th:text="${s.coefficient}">1</td>
        <td th:text="${s.professor != null ? (s.professor.firstName + ' ' + s.professor.lastName) : '-'}">-</td>
        <td class="text-end">
          <a class="btn btn-sm btn-primary" th:href="@{|/admin/subjects/${s.id}/edit|}">Modifier</a>
          <form th:action="@{|/admin/subjects/${s.id}/delete|}" method="post" class="d-inline">
            <button class="btn btn-sm btn-danger" onclick="return confirm('Supprimer?')">Supprimer</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(subjects)}">
        <td colspan="5" class="text-center text-muted">Aucune matière</td>
      </tr>
      </tbody>
    </table>
  </section>
</div>
</body>
</html>
