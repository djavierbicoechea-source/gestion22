<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
  <div th:replace="layout/base :: layout(~{::section})">
    <section>
      <h1 class="mb-4">Dashboard</h1>

      <div class="row g-3">
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Étudiants</h5>
              <p class="display-6" th:text="${studentsCount}">0</p>
              <a class="btn btn-primary" th:href="@{/admin/students}">Gérer</a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Professeurs</h5>
              <p class="display-6" th:text="${professorsCount}">0</p>
              <a class="btn btn-primary" th:href="@{/admin/professors}">Gérer</a>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Matières</h5>
              <p class="display-6" th:text="${subjectsCount}">0</p>
              <a class="btn btn-primary" th:href="@{/admin/subjects}">Gérer</a>
            </div>
          </div>
        </div>
      </div>

      <hr class="my-4" />
      <div class="alert alert-primary">
        <b>Moyenne globale pondérée:</b> <span th:text="${#numbers.formatDecimal(globalAverage,1,2)}">0.00</span>
        <a class="btn btn-sm btn-outline-primary ms-2" th:href="@{/admin/stats}">Voir stats</a>
      </div>

      <p class="text-muted">
        Astuce: pour voir le bulletin d’un étudiant, allez dans <b>Étudiants</b> puis cliquez <b>Bulletin</b>.
      </p>
    </section>
  </div>
</body>
</html>
