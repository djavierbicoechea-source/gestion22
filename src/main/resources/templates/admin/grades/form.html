<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/base :: layout(~{::section})">
  <section>
    <h1 th:text="${grade.id} == null ? 'Nouvelle note' : 'Modifier note'">Nouvelle note</h1>

    <form th:action="${grade.id} == null ? @{/admin/grades} : @{'/admin/grades/' + ${grade.id}}"
          th:object="${grade}" method="post" class="mt-3">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Étudiant</label>
          <select class="form-select" th:field="*{student}" required>
            <option value="" disabled th:selected="${grade.student} == null">-- Choisir --</option>
            <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.firstName + ' ' + s.lastName}"
                    th:selected="${grade.student != null and grade.student.id == s.id}"></option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Matière</label>
          <select class="form-select" th:field="*{subject}" required>
            <option value="" disabled th:selected="${grade.subject} == null">-- Choisir --</option>
            <option th:each="m : ${subjects}" th:value="${m.id}" th:text="${m.name}"
                    th:selected="${grade.subject != null and grade.subject.id == m.id}"></option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Note</label>
          <input class="form-control" th:field="*{value}" type="number" step="0.01" min="0" max="20" required />
          <div class="form-text">Ex: 0 à 20</div>
        </div>
      </div>

      <div class="mt-3">
        <button class="btn btn-primary">Enregistrer</button>
        <a class="btn btn-secondary" th:href="@{/admin/grades}">Annuler</a>
      </div>
    </form>
  </section>
</div>
</body>
</html>
