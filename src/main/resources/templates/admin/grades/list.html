<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/base :: layout(~{::section})">
  <section>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="m-0">Notes</h1>
      <a class="btn btn-success" th:href="@{/admin/grades/new}">+ Nouvelle note</a>
    </div>

    <table class="table table-striped align-middle">
      <thead>
      <tr>
        <th>ID</th><th>Étudiant</th><th>Matière</th><th>Note</th><th class="text-end">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="g : ${grades}">
        <td th:text="${g.id}">1</td>
        <td th:text="${g.student.firstName + ' ' + g.student.lastName}">...</td>
        <td th:text="${g.subject.name}">...</td>
        <td th:text="${g.value}">10</td>
        <td class="text-end">
          <a class="btn btn-sm btn-primary" th:href="@{|/admin/grades/${g.id}/edit|}">Modifier</a>
          <form th:action="@{|/admin/grades/${g.id}/delete|}" method="post" class="d-inline">
            <button class="btn btn-sm btn-danger" onclick="return confirm('Supprimer?')">Supprimer</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(grades)}">
        <td colspan="5" class="text-center text-muted">Aucune note</td>
      </tr>
      </tbody>
    </table>

    <div class="alert alert-secondary mt-3">
      Conseil: créez d’abord des <b>Étudiants</b> et des <b>Matières</b> avant d’ajouter des notes.
    </div>
  </section>
</div>
</body>
</html>
