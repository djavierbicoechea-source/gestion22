<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/base :: layout(~{::section})">
  <section>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="m-0">Professeurs</h1>

  <div th:if="${createdAccountMsg}" class="alert alert-success" th:text="${createdAccountMsg}"></div>
      <a class="btn btn-success" th:href="@{/admin/professors/new}">+ Nouveau</a>
    </div>

    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>ID</th><th>Prénom</th><th>Nom</th><th>Email</th><th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${professors}">
          <td th:text="${p.id}">1</td>
          <td th:text="${p.firstName}">Jean</td>
          <td th:text="${p.lastName}">Dupont</td>
          <td th:text="${p.email}">x@y.com</td>
          <td class="text-end">
            <a class="btn btn-sm btn-primary" th:href="@{|/admin/professors/${p.id}/edit|}">Modifier</a>
            <form th:action="@{|/admin/professors/${p.id}/delete|}" method="post" class="d-inline">
              <button class="btn btn-sm btn-danger" onclick="return confirm('Supprimer?')">Supprimer</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(professors)}">
          <td colspan="5" class="text-center text-muted">Aucun professeur</td>
        </tr>
      </tbody>
    </table>
  </section>
</div>
</body>
</html>
