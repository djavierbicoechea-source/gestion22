<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/base :: layout(~{::section})">
  <section>
    <h1 th:text="${professor.id} == null ? 'Nouveau professeur' : 'Modifier professeur'">Form</h1>

    <form th:action="${professor.id} == null ? @{/admin/professors} : @{'/admin/professors/' + ${professor.id}}"
          th:object="${professor}" method="post" class="mt-3">

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Prénom</label>
          <input class="form-control" th:field="*{firstName}" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Nom</label>
          <input class="form-control" th:field="*{lastName}" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input class="form-control" th:field="*{email}" type="email" required />
        </div>
      </div>

      <div class="mt-3">
        <button class="btn btn-primary">Enregistrer</button>
        <a class="btn btn-secondary" th:href="@{/admin/professors}">Annuler</a>
      </div>
    </form>
  </section>
</div>
</body>
</html>
