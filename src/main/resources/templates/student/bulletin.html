<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="layout/base :: layout(~{::section})">
  <section>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="m-0">Bulletin</h1>
      <div>
        <a class="btn btn-secondary" th:href="${backUrl} ?: @{/student/dashboard}">← Retour</a>
        <a class="btn btn-outline-primary ms-2" th:href="${pdfUrl}" target="_blank">PDF</a>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <h5 class="card-title" th:text="${student.firstName + ' ' + student.lastName}">Nom</h5>
        <p class="card-text mb-0"><b>Email:</b> <span th:text="${student.email}">x</span></p>
        <p class="card-text"><b>Classe:</b> <span th:text="${student.classroom}">x</span></p>
      </div>
    </div>

    <table class="table table-bordered align-middle">
      <thead class="table-light">
      <tr>
        <th>Matière</th><th>Coef</th><th>Note</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="g : ${grades}">
        <td th:text="${g.subject.name}">Math</td>
        <td th:text="${g.subject.coefficient}">1</td>
        <td th:text="${g.value}">10</td>
      </tr>
      <tr th:if="${#lists.isEmpty(grades)}">
        <td colspan="3" class="text-center text-muted">Aucune note pour cet étudiant</td>
      </tr>
      </tbody>
    </table>

    <div class="alert alert-info">
      <b>Moyenne pondérée:</b> <span th:text="${#numbers.formatDecimal(weightedAverage, 1, 2)}">0.00</span>
    </div>
  </section>
</div>
</body>
</html>
