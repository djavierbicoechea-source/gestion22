<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${title} ?: 'School Management'">School Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/post-login}">School</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <!-- ADMIN MENU -->
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/students}">Étudiants</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/professors}">Professeurs</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/subjects}">Matières</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/grades}">Notes</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" th:href="@{/admin/stats}">Stats</a>
        </li>

        <!-- PROFESSOR MENU -->
        <li class="nav-item" sec:authorize="hasRole('PROFESSOR')">
          <a class="nav-link" th:href="@{/professor/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('PROFESSOR')">
          <a class="nav-link" th:href="@{/professor/grades}">Entrer notes</a>
        </li>

        <!-- STUDENT MENU -->
        <li class="nav-item" sec:authorize="hasRole('STUDENT')">
          <a class="nav-link" th:href="@{/student/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('STUDENT')">
          <a class="nav-link" th:href="@{/student/bulletin}">Mes notes</a>
        </li>
    </ul>

      <form class="d-flex" th:action="@{/logout}" method="post">
        <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
      </form>
    </div>
  </div>
</nav>

<main class="container py-4">
  <div th:replace="${content}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
