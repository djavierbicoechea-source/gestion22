<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="layout/base :: layout(~{::section})">
<section>
  <h1 class="mb-3">Entrer des notes</h1>

  <div th:if="${param.forbidden}" class="alert alert-danger">Accès interdit à cette matière.</div>
  <div th:if="${savedMsg}" class="alert alert-success" th:text="${savedMsg}">OK</div>

  <form method="get" th:action="@{/professor/grades}" class="row g-2 align-items-end mb-3">
    <div class="col-md-6">
      <label class="form-label">Matière</label>
      <select class="form-select" name="subjectId" required>
        <option value="" th:selected="${subjectId == null}">-- Choisir --</option>
        <option th:each="s : ${subjects}"
                th:value="${s.id}"
                th:selected="${subjectId != null and subjectId == s.id}"
                th:text="${s.name}">Matière</option>
      </select>
    </div>
    <div class="col-md-3">
      <button class="btn btn-primary" type="submit">Charger</button>
    </div>
  </form>

  <div th:if="${subject != null}">
    <h5 class="mb-3">Matière: <span th:text="${subject.name}">X</span></h5>

    <table class="table table-striped">
      <thead>
      <tr>
        <th>Étudiant</th>
        <th style="width: 220px;">Note (0-20)</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="st : ${students}">
        <td th:text="${st.firstName + ' ' + st.lastName}">Nom</td>
        <td>
          <form method="post" th:action="@{/professor/grades}" class="d-flex gap-2">
            <input type="hidden" name="subjectId" th:value="${subject.id}">
            <input type="hidden" name="studentId" th:value="${st.id}">
            <input type="number" min="0" max="20" step="0.5" name="value" class="form-control" placeholder="ex: 15">
            <button class="btn btn-sm btn-success" type="submit">Enregistrer</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</section>
</html>
