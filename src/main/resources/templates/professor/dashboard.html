<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="layout/base :: layout(~{::section})">
<section>
  <h1 class="mb-3">Dashboard Professeur</h1>

  <div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title" th:text="${professor.firstName + ' ' + professor.lastName}">Nom</h5>
      <p class="mb-0"><b>Email:</b> <span th:text="${professor.email}">x</span></p>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <h5 class="card-title">Mes matières</h5>
      <ul class="mb-0">
        <li th:each="s : ${subjects}" th:text="${s.name}">Matière</li>
      </ul>
    </div>
  </div>

  <div class="mt-3">
    <a class="btn btn-primary" th:href="@{/professor/grades}">Entrer des notes</a>
  </div>
</section>
</html>
