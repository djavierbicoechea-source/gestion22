<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h4 mb-3">Connexion</h1>

            <div th:if="${param.error}" class="alert alert-danger">Identifiants incorrects.</div>
            <div th:if="${param.logout}" class="alert alert-success">Déconnecté.</div>

            <form th:action="@{/login}" method="post">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" name="username" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required />
              </div>
              <button class="btn btn-primary w-100">Se connecter</button>
            </form>

            <hr class="my-4" />
            <p class="text-muted small m-0">
              Comptes demo (créés au 1er lancement):<br/>
              Admin: <b>admin</b> / <b>school2026</b><br/>
              Professeur: <b>prof1</b> / <b>teach2026</b><br/>
              Étudiant: <b>student1</b> / <b>learn2026</b>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
